name: Security Gate

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  security-suite:
    name: Security Test Suite + Policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            fastapi \
            "uvicorn[standard]" \
            pydantic \
            httpx \
            numpy \
            faiss-cpu

      - name: Run mandatory security HTTP/authz suite
        run: |
          python -m unittest \
            tests.test_auth_manager \
            tests.test_config_security_defaults \
            tests.test_security_manager \
            tests.test_security_http_authz \
            tests.test_tool_enforcement_modes \
            tests.test_tool_plugin_signing \
            tests.test_tool_permission_manager \
            -v

      - name: Run security policy check
        run: |
          python scripts/security/policy_check.py

  security-scans:
    name: SAST + Dependency Audit + SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanning dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit cyclonedx-bom

      - name: SAST (Bandit, high severity/high confidence)
        run: |
          bandit -r agents api automation controller memory models planner runtime storage tasks tools scripts \
            -x tests,macos \
            -lll -iii -q

      - name: Dependency vulnerability audit (blocking)
        run: |
          pip-audit -r requirements.txt --strict --progress-spinner off

      - name: Generate SBOM (CycloneDX)
        run: |
          mkdir -p artifacts
          cyclonedx-py requirements requirements.txt --of JSON -o artifacts/sbom.json
          test -s artifacts/sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-sbom
          path: artifacts/sbom.json
          if-no-files-found: error
